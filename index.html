<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CRT Factory Game</title>

<style>
body{
    font-family:Arial;
    background:#f4f4f4;
    padding:40px;
}

/* アップデート通知 */
.update-badge {
    background: #e1f5fe;
    color: #01579b;
    padding: 10px 15px;
    border-radius: 5px;
    border-left: 5px solid #0288d1;
    margin-bottom: 20px;
    font-size: 14px;
}

input{
    width:60px;
    padding:4px;
    margin:4px;
}

button{
    padding:8px 16px;
    margin-top:10px;
    cursor:pointer;
}

.error{
    color:red;
    font-weight:bold;
    margin-top:10px;
}

#rules{
    background:white;
    padding:15px;
    border-radius:8px;
    border:1px solid #ccc;
    margin-bottom:20px;
}

#factory{
    display:none;
    margin-top:40px;
}

.row{
    display:flex;
    align-items:center;
    margin:16px 0;
}

.label{
    width:50px;
    font-weight:bold;
}

.belt{
    position:relative;
    flex:1;
    height:36px;
    background:#ddd;
    border-radius:18px;
    /* overflow:hidden; を削除（ワープ演出のため） */
}

.factoryBox{
    position:absolute;
    left:130px;
    width:80px;
    height:36px;
    background:#888;
    z-index: 1;
}

.block{
    position:absolute;
    width:60px;
    height:26px;
    background:#2a5298;
    color:white;
    font-size:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:4px;
    z-index: 2;
    transition: all 1.5s ease;
}

/* 下段コンベア（ラインB） */
#mergeArea{
    margin-top:80px;
    height:60px;
    background:#ccc;
    border-radius:30px;
    position:relative;
    border: 4px solid #bbb;
}
</style>
</head>

<body>

<h2>CRT 計算機</h2>

<div id="systemLog" class="update-badge">
    <strong>PATCH 1.0.4:</strong> 二段式ラインシステムを導入。ラインAの終端からラインBの始端への転送プロトコルを実装しました。
</div>

<div id="rules">
<b>ゲームルール</b><br>
・余りは 0以上、割る数未満<br>
・最大数は 30030
</div>

<form id="form">
2での余り：<input type="number" name="r0" required><br>
3での余り：<input type="number" name="r1" required><br>
5での余り：<input type="number" name="r2" required><br>
7での余り：<input type="number" name="r3" required><br>
11での余り：<input type="number" name="r4" required><br>
13での余り：<input type="number" name="r5" required><br>
<button type="submit">計算</button>
<div id="errorBox" class="error"></div>
</form>

<div id="factory">
    <h3>ラインA：個別計算中...</h3>
    <div id="beltArea"></div>
    <h3>ラインB：統合準備中...</h3>
    <div id="mergeArea"></div>
</div>

<h3 id="result"></h3>

<script>
const mods = [2,3,5,7,11,13];
const M = 30030;

const form = document.getElementById("form");
const factory = document.getElementById("factory");
const resultBox = document.getElementById("result");
const mergeArea = document.getElementById("mergeArea");
const errorBox = document.getElementById("errorBox");
const rules = document.getElementById("rules");
const beltArea = document.getElementById("beltArea");

function createBelts() {
    beltArea.innerHTML = "";
    mods.forEach((m,i)=>{
        const row = document.createElement("div");
        row.className = "row";
        row.innerHTML = `
            <div class="label">${m}</div>
            <div class="belt">
                <div class="factoryBox"></div>
                <div class="block" id="block${i}" style="left: 0px; top: 5px; transition: none;">?</div>
            </div>
        `;
        beltArea.appendChild(row);
    });
}

createBelts();

function inv(a, m){
    let m0 = m, x0 = 0, x1 = 1;
    if(m === 1) return 0;
    while(a > 1){
        let q = Math.floor(a/m);
        [a,m] = [m, a % m];
        [x0,x1] = [x1 - q*x0, x0];
    }
    return x1 < 0 ? x1 + m0 : x1;
}

form.addEventListener("submit", function(e){
    e.preventDefault();
    errorBox.innerText = "";
    
    const values = [];
    for(let i=0; i<mods.length; i++){
        const v = Number(form.querySelector(`[name=r${i}]`).value);
        if(!Number.isInteger(v)){ errorBox.innerText="整数を入力"; return; }
        if(v<0 || v>=mods[i]){ errorBox.innerText="範囲外"; return; }
        values.push(v);
    }

    createBelts();
    mergeArea.innerHTML = "";
    resultBox.innerText = "";
    
    form.style.display = "none";
    rules.style.display = "none";
    factory.style.display = "block";

    let total = 0;
    const parts = [];
    for(let i=0; i<mods.length; i++){
        const Mi = M / mods[i];
        const yi = inv(Mi % mods[i], mods[i]);
        const part = values[i] * Mi * yi;
        parts.push(part);
        total += part;
    }

    /* ===== アニメーション開始 ===== */
    parts.forEach((val, i) => {
        const block = document.getElementById("block" + i);
        block.innerText = values[i];

        // 1. 工場Aの中へ
        setTimeout(() => {
            block.style.transition = "left 2s linear";
            block.style.left = "130px";
        }, 100 + (i * 200)); // 少しずつずらして出発

        // 2. 数値変化
        setTimeout(() => {
            block.innerText = val;
            block.style.background = "#e67e22";
        }, 2200 + (i * 200));

        // 3. ラインAの端まで行く
        setTimeout(() => {
            block.style.transition = "left 2s linear";
            block.style.left = "calc(100% + 60px)"; // 画面外へ
            block.style.opacity = "0";
        }, 4500 + (i * 200));

        // 4. ラインB（下のコンベア）の左端にテレポートして整列
        setTimeout(() => {
            mergeArea.appendChild(block);
            block.style.transition = "none";
            block.style.left = "-70px"; // 左の外側から
            block.style.top = "15px";
            block.style.opacity = "1";
            block.offsetHeight; // リフロー

            // ラインBに入って整列位置（順番通り）へ
            block.style.transition = "left 1.5s ease-out";
            block.style.left = (i * 70 + 10) + "px";
        }, 7000 + (i * 200));
    });

    // 5. ラインBの右端で合流
    setTimeout(() => {
        const blocks = mergeArea.querySelectorAll(".block");
        blocks.forEach((b) => {
            b.style.transition = "left 2s cubic-bezier(0.55, 0.055, 0.675, 0.19)";
            b.style.left = "calc(100% - 80px)";
        });
    }, 10000);

    // 6. 合体して最終計算
    setTimeout(() => {
        mergeArea.innerHTML = "";
        const sum = document.createElement("div");
        sum.className = "block";
        sum.style.left = "80%";
        sum.style.top = "15px";
        sum.style.width = "auto";
        sum.style.padding = "0 15px";
        sum.style.background = "#2a5298";
        sum.innerText = total;
        mergeArea.appendChild(sum);

        // 中央へ移動
        setTimeout(() => {
            sum.style.transition = "left 1s ease";
            sum.style.left = "50%";
            sum.style.transform = "translateX(-50%)";
        }, 100);

        let current = total;
        function subtract(){
            if(current >= M){
                current -= M;
                sum.innerText = current;
                sum.style.background = "#d9534f";
                setTimeout(() => sum.style.background = "#2a5298", 200);
                setTimeout(subtract, 500);
            } else {
                resultBox.innerText = "最終結果: " + current;
                setTimeout(() => {
                    form.style.display = "block";
                    rules.style.display = "block";
                    factory.style.display = "none";
                }, 2000);
            }
        }
        setTimeout(subtract, 1500);
    }, 12500);
});
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CRT Factory</title>

<style>
body{font-family:Arial;background:#f4f4f4;padding:40px}
input{width:60px;padding:4px;margin:4px}
button{padding:8px 16px;margin-top:10px;cursor:pointer}
.error{color:red;font-weight:bold;margin-top:10px}

#rules{background:white;padding:15px;border-radius:8px;border:1px solid #ccc;margin-bottom:20px}

#factory{display:none;margin-top:40px}

.row{display:flex;align-items:center;margin:16px 0}
.label{width:50px;font-weight:bold}

.belt{position:relative;flex:1;height:36px;background:#ddd;border-radius:18px;overflow:hidden}

.factoryBox{position:absolute;left:130px;width:80px;height:36px;background:#888}

.block{
position:absolute;
width:60px;height:26px;
background:#2a5298;color:white;
font-size:12px;
display:flex;align-items:center;justify-content:center;
border-radius:4px;
}

#mergeArea{
margin-top:80px;
height:120px;
background:#bbb;
border-radius:30px;
position:relative;
}
</style>
</head>

<body>

<h2>CRT Factory</h2>

<div id="rules">
<b>ルール</b><br>
余りは 0以上、割る数未満<br>
最大数は 30030
</div>

<form id="form">
2: <input type="number" name="r0" required><br>
3: <input type="number" name="r1" required><br>
5: <input type="number" name="r2" required><br>
7: <input type="number" name="r3" required><br>
11: <input type="number" name="r4" required><br>
13: <input type="number" name="r5" required><br>
<button type="submit">計算</button>
<div id="errorBox" class="error"></div>
</form>

<div id="factory">
<h3>計算中...</h3>

<div id="belts"></div>

<div id="mergeArea"></div>
</div>

<h3 id="result"></h3>

<script>
const mods=[2,3,5,7,11,13];
const M=30030;

const form=document.getElementById("form");
const factory=document.getElementById("factory");
const resultBox=document.getElementById("result");
const mergeArea=document.getElementById("mergeArea");
const errorBox=document.getElementById("errorBox");
const rules=document.getElementById("rules");
const beltsDiv=document.getElementById("belts");

/* ===== ベルト生成（初期化1回のみ）===== */
mods.forEach((m,i)=>{
    const row=document.createElement("div");
    row.className="row";

    row.innerHTML=`
    <div class="label">${m}</div>
    <div class="belt">
        <div class="factoryBox"></div>
        <div class="block" id="block${i}">?</div>
    </div>
    `;

    beltsDiv.appendChild(row);
});

/* 逆元 */
function inv(a,m){
    let m0=m,x0=0,x1=1;
    if(m===1) return 0;
    while(a>1){
        let q=Math.floor(a/m);
        [a,m]=[m,a%m];
        [x0,x1]=[x1-q*x0,x0];
    }
    if(x1<0) x1+=m0;
    return x1;
}

form.addEventListener("submit",function(e){
e.preventDefault();
errorBox.innerText="";
mergeArea.innerHTML="";
resultBox.innerText="";

/* ブロック完全リセット */
mods.forEach((_,i)=>{
    const block=document.getElementById("block"+i);
    const belt=document.querySelectorAll(".belt")[i];
    belt.appendChild(block);
    block.style.transition="none";
    block.style.left="0px";
    block.style.top="5px";
    block.style.opacity="1";
    block.style.transform="none";
});

const values=[];

for(let i=0;i<mods.length;i++){
    const v=Number(form.querySelector(`[name=r${i}]`).value);
    if(!Number.isInteger(v)){errorBox.innerText="整数を入力";return;}
    if(v<0||v>=mods[i]){errorBox.innerText="範囲外";return;}
    values.push(v);
}

form.style.display="none";
rules.style.display="none";
factory.style.display="block";

/* 計算 */
let total=0;
const parts=[];

for(let i=0;i<mods.length;i++){
    const Mi=M/mods[i];
    const yi=inv(Mi%mods[i],mods[i]);
    const part=values[i]*Mi*yi;
    parts.push(part);
    total+=part;
}

/* アニメ */
parts.forEach((val,i)=>{
    const block=document.getElementById("block"+i);

    block.innerText=values[i];

    setTimeout(()=>{
        block.style.transition="left 2s";
        block.style.left="130px";
    },300);

    setTimeout(()=>{
        block.innerText=val;
    },2500);

    setTimeout(()=>{
        block.style.transition="left 3s";
        block.style.left="calc(100% - 70px)";
    },3000);

    setTimeout(()=>{
        const rect=block.getBoundingClientRect();
        const mergeRect=mergeArea.getBoundingClientRect();
        const dx=rect.left-mergeRect.left;
        const dy=rect.top-mergeRect.top;
        mergeArea.appendChild(block);
        block.style.transition="none";
        block.style.left=dx+"px";
        block.style.top=dy+"px";
        block.offsetHeight;
        block.style.transition="top 1.5s";
        block.style.top="40px";
    },6500);
});

/* 合流 */
setTimeout(()=>{
    const blocks=mergeArea.querySelectorAll(".block");
    blocks.forEach((b,i)=>{
        b.style.transition="left 1.5s";
        b.style.left=(i*70)+"px";
    });
},9000);

/* 集約 */
setTimeout(()=>{
    mergeArea.innerHTML="";
    const sum=document.createElement("div");
    sum.className="block";
    sum.style.left="50%";
    sum.style.top="40px";
    sum.style.transform="translateX(-50%)";
    sum.innerText=total;
    mergeArea.appendChild(sum);

    /* 引き算 */
    let current=total;

    function subtract(){
        if(current>=M){
            current-=M;
            sum.innerText=current;
            setTimeout(subtract,600);
        }else{
            resultBox.innerText="最終結果: "+current;
            setTimeout(()=>{
                form.style.display="block";
                rules.style.display="block";
                factory.style.display="none";
            },2000);
        }
    }
    setTimeout(subtract,1500);

},11000);

});
</script>

</body>
</html>

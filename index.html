<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CRT Cyber Factory</title>

<style>
:root {
    --bg-color: #0d1117;
    --panel-color: #161b22;
    --accent-blue: #58a6ff;
    --accent-orange: #f0883e;
    --accent-green: #3fb950;
    --accent-red: #f85149;
    --text-main: #c9d1d9;
    --belt-color: #30363d;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: var(--bg-color);
    color: var(--text-main);
    padding: 40px;
    margin: 0;
}

h2 {
    color: var(--accent-blue);
    text-transform: uppercase;
    letter-spacing: 2px;
    border-bottom: 2px solid var(--accent-blue);
    display: inline-block;
    padding-bottom: 10px;
}

/* アップデート通知 */
.update-badge {
    background: rgba(88, 166, 255, 0.1);
    color: var(--accent-blue);
    padding: 12px 20px;
    border-radius: 6px;
    border: 1px solid var(--accent-blue);
    margin-bottom: 30px;
    font-size: 14px;
    box-shadow: 0 0 15px rgba(88, 166, 255, 0.2);
}

#rules {
    background: var(--panel-color);
    padding: 20px;
    border-radius: 12px;
    border: 1px solid #30363d;
    margin-bottom: 30px;
}

/* フォーム周り */
form {
    background: var(--panel-color);
    padding: 25px;
    border-radius: 12px;
    border: 1px solid #30363d;
    display: inline-block;
}

input {
    background: #0d1117;
    color: var(--accent-blue);
    border: 1px solid #484f58;
    padding: 8px;
    margin: 6px;
    border-radius: 4px;
    font-family: monospace;
    font-size: 16px;
    width: 80px;
}

input:focus {
    outline: none;
    border-color: var(--accent-blue);
    box-shadow: 0 0 8px rgba(88, 166, 255, 0.4);
}

button {
    background: var(--accent-blue);
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
    margin-top: 15px;
}

button:hover {
    background: #1f6feb;
    box-shadow: 0 0 20px rgba(88, 166, 255, 0.5);
}

/* 工場エリア */
#factory {
    display: none;
    margin-top: 50px;
}

.row {
    display: flex;
    align-items: center;
    margin: 20px 0;
}

.label {
    width: 80px;
    font-weight: bold;
    color: var(--accent-blue);
    font-family: monospace;
}

/* ベルトのアニメーション */
.belt {
    position: relative;
    flex: 1;
    height: 40px;
    background: var(--belt-color);
    border-radius: 20px;
    box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
    background-image: linear-gradient(90deg, transparent 50%, rgba(255,255,255,0.05) 50%);
    background-size: 40px 100%;
    animation: moveBelt 1s linear infinite;
}

@keyframes moveBelt {
    from { background-position: 0 0; }
    to { background-position: 40px 0; }
}

.factoryBox {
    position: absolute;
    left: 130px;
    width: 90px;
    height: 100%;
    background: #21262d;
    border: 2px solid var(--accent-blue);
    border-radius: 4px;
    z-index: 10;
    box-shadow: 0 0 15px rgba(88, 166, 255, 0.3);
}

.block {
    position: absolute;
    width: 70px;
    height: 30px;
    background: var(--accent-blue);
    color: #0d1117;
    font-size: 14px;
    font-weight: 900;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    z-index: 5;
    transition: all 1.5s ease;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
}

/* ラインB（下段） */
#mergeArea {
    margin-top: 100px;
    height: 70px;
    background: #161b22;
    border-radius: 35px;
    position: relative;
    border: 2px solid #30363d;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
}

.error { color: var(--accent-red); margin-top: 15px; }
#result { text-align: center; font-size: 2em; color: var(--accent-green); text-shadow: 0 0 15px rgba(63, 185, 80, 0.4); }

</style>
</head>

<body>

<h2>CRT Quantum Factory</h2>

<div id="systemLog" class="update-badge">
    <strong>PATCH 1.0.6:</strong> UIオーバーホール完了。ダークモード・ネオンインターフェースを実装。ベルトコンベヤーの可動アニメーションを追加しました。
</div>

<div id="rules">
    <strong>PROTOCOL:</strong> 余りは 0以上、法（Mod）未満を入力。システム最大限界値：30030
</div>

<form id="form">
    MOD 02: <input type="number" name="r0" required><br>
    MOD 03: <input type="number" name="r1" required><br>
    MOD 05: <input type="number" name="r2" required><br>
    MOD 07: <input type="number" name="r3" required><br>
    MOD 11: <input type="number" name="r4" required><br>
    MOD 13: <input type="number" name="r5" required><br>
    <button type="submit">EXECUTE CALCULATION</button>
    <div id="errorBox" class="error"></div>
</form>

<div id="factory">
    <h3 style="color:var(--accent-orange)">LINE-A: ATOMIC PROCESSING</h3>
    <div id="beltArea"></div>
    <h3 style="color:var(--accent-green)">LINE-B: DATA MERGING</h3>
    <div id="mergeArea"></div>
</div>

<h3 id="result"></h3>

<script>
const mods = [2,3,5,7,11,13];
const M = 30030;

const form = document.getElementById("form");
const factory = document.getElementById("factory");
const resultBox = document.getElementById("result");
const mergeArea = document.getElementById("mergeArea");
const errorBox = document.getElementById("errorBox");
const beltArea = document.getElementById("beltArea");

function createBelts() {
    beltArea.innerHTML = "";
    mods.forEach((m,i)=>{
        const row = document.createElement("div");
        row.className = "row";
        row.innerHTML = `
            <div class="label">M ${m}</div>
            <div class="belt">
                <div class="factoryBox"></div>
                <div class="block" id="block${i}" style="left: 0px; top: 5px; transition: none;">?</div>
            </div>
        `;
        beltArea.appendChild(row);
    });
}

createBelts();

function inv(a, m){
    let m0 = m, x0 = 0, x1 = 1;
    if(m === 1) return 0;
    while(a > 1){
        let q = Math.floor(a/m);
        [a,m] = [m, a % m];
        [x0,x1] = [x1 - q*x0, x0];
    }
    return x1 < 0 ? x1 + m0 : x1;
}

form.addEventListener("submit", function(e){
    e.preventDefault();
    errorBox.innerText = "";
    
    const values = [];
    for(let i=0; i<mods.length; i++){
        const v = Number(form.querySelector(`[name=r${i}]`).value);
        if(!Number.isInteger(v)){ errorBox.innerText="ERROR: INT ONLY"; return; }
        if(v<0 || v>=mods[i]){ errorBox.innerText="ERROR: OUT OF RANGE"; return; }
        values.push(v);
    }

    createBelts();
    mergeArea.innerHTML = "";
    resultBox.innerText = "";
    
    form.style.display = "none";
    document.getElementById("rules").style.display = "none";
    factory.style.display = "block";

    let total = 0;
    const parts = [];
    for(let i=0; i<mods.length; i++){
        const Mi = M / mods[i];
        const yi = inv(Mi % mods[i], mods[i]);
        const part = values[i] * Mi * yi;
        parts.push(part);
        total += part;
    }

    parts.forEach((val, i) => {
        const block = document.getElementById("block" + i);
        block.innerText = values[i];

        setTimeout(() => {
            block.style.transition = "left 1.5s linear";
            block.style.left = "135px";
        }, 100 + (i * 300));

        setTimeout(() => {
            block.innerText = val;
            block.style.background = "var(--accent-orange)";
        }, 1600 + (i * 300));

        setTimeout(() => {
            block.style.transition = "left 2.5s linear";
            block.style.left = "calc(100% - 70px)"; 
        }, 3100 + (i * 300));

        setTimeout(() => {
            block.style.opacity = "0";
            setTimeout(() => {
                mergeArea.appendChild(block);
                block.style.transition = "none";
                block.style.left = "-80px";
                block.style.top = "18px";
                block.style.opacity = "1";
                block.offsetHeight;
                block.style.transition = "left 1s ease-out";
                block.style.left = (i * 75 + 15) + "px";
            }, 100);
        }, 5600 + (i * 300));
    });

    setTimeout(() => {
        const blocks = mergeArea.querySelectorAll(".block");
        blocks.forEach((b) => {
            b.style.transition = "left 2s cubic-bezier(0.5, 0, 0.5, 1)";
            b.style.left = "calc(100% - 90px)";
        });
    }, 10000);

    setTimeout(() => {
        mergeArea.innerHTML = "";
        const sum = document.createElement("div");
        sum.className = "block";
        sum.style.left = "90%";
        sum.style.top = "18px";
        sum.style.width = "auto";
        sum.style.padding = "0 20px";
        sum.style.background = "var(--accent-green)";
        sum.innerText = total;
        mergeArea.appendChild(sum);

        setTimeout(() => {
            sum.style.transition = "left 1s ease";
            sum.style.left = "50%";
            sum.style.transform = "translateX(-50%)";
        }, 100);

        let current = total;
        function subtract(){
            if(current >= M){
                current -= M;
                sum.innerText = current;
                sum.style.boxShadow = "0 0 25px var(--accent-red)";
                setTimeout(() => sum.style.boxShadow = "none", 200);
                setTimeout(subtract, 400);
            } else {
                resultBox.innerText = "OUTPUT: " + current;
                setTimeout(() => {
                    form.style.display = "block";
                    document.getElementById("rules").style.display = "block";
                    factory.style.display = "none";
                }, 3000);
            }
        }
        setTimeout(subtract, 1500);
    }, 12500);
});
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CRT Factory Game</title>

<style>
body{
    font-family:Arial;
    background:#f4f4f4;
    padding:40px;
}

/* アップデート通知 */
.update-badge {
    background: #fff3e0;
    color: #e65100;
    padding: 10px 15px;
    border-radius: 5px;
    border-left: 5px solid #ff9800;
    margin-bottom: 20px;
    font-size: 14px;
}

input{
    width:60px;
    padding:4px;
    margin:4px;
}

button{
    padding:8px 16px;
    margin-top:10px;
    cursor:pointer;
}

.error{
    color:red;
    font-weight:bold;
    margin-top:10px;
}

#rules{
    background:white;
    padding:15px;
    border-radius:8px;
    border:1px solid #ccc;
    margin-bottom:20px;
}

#factory{
    display:none;
    margin-top:40px;
}

.row{
    display:flex;
    align-items:center;
    margin:16px 0;
}

.label{
    width:50px;
    font-weight:bold;
}

.belt{
    position:relative;
    flex:1;
    height:36px;
    background:#ddd;
    border-radius:18px;
    overflow:hidden;
}

.factoryBox{
    position:absolute;
    left:130px;
    width:80px;
    height:36px;
    background:#888;
    z-index: 1; /* ブロックより下に */
}

.block{
    position:absolute;
    width:60px;
    height:26px;
    background:#2a5298;
    color:white;
    font-size:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:4px;
    z-index: 2; /* ブロックを上に */
    transition: all 1.5s ease;
}

#mergeArea{
    margin-top:80px;
    height:120px;
    background:#bbb;
    border-radius:30px;
    position:relative;
}
</style>
</head>

<body>

<h2>CRT 計算機</h2>

<div id="systemLog" class="update-badge">
    <strong>PATCH 1.0.3:</strong> 瞬間移動バグを修正。再起動後もマテリアルがコンベヤーを滑らかに流れるように慣性制御を調整しました。
</div>

<div id="rules">
<b>ゲームルール</b><br>
・余りは 0以上、割る数未満<br>
・最大数は 30030
</div>

<form id="form">
2での余り：<input type="number" name="r0" required><br>
3での余り：<input type="number" name="r1" required><br>
5での余り：<input type="number" name="r2" required><br>
7での余り：<input type="number" name="r3" required><br>
11での余り：<input type="number" name="r4" required><br>
13での余り：<input type="number" name="r5" required><br>
<button type="submit">計算</button>
<div id="errorBox" class="error"></div>
</form>

<div id="factory">
    <h3>計算ユニット稼働中...</h3>
    <div id="beltArea"></div>
    <div id="mergeArea"></div>
</div>

<h3 id="result"></h3>

<script>
const mods = [2,3,5,7,11,13];
const M = 30030;

const form = document.getElementById("form");
const factory = document.getElementById("factory");
const resultBox = document.getElementById("result");
const mergeArea = document.getElementById("mergeArea");
const errorBox = document.getElementById("errorBox");
const rules = document.getElementById("rules");
const beltArea = document.getElementById("beltArea");

/* ベルト生成 */
function createBelts() {
    beltArea.innerHTML = "";
    mods.forEach((m,i)=>{
        const row = document.createElement("div");
        row.className = "row";
        row.innerHTML = `
            <div class="label">${m}</div>
            <div class="belt">
                <div class="factoryBox"></div>
                <div class="block" id="block${i}" style="left: 0px; top: 5px; transition: none;">?</div>
            </div>
        `;
        beltArea.appendChild(row);
    });
}

createBelts();

function inv(a, m){
    let m0 = m, x0 = 0, x1 = 1;
    if(m === 1) return 0;
    while(a > 1){
        let q = Math.floor(a/m);
        [a,m] = [m, a % m];
        [x0,x1] = [x1 - q*x0, x0];
    }
    return x1 < 0 ? x1 + m0 : x1;
}

form.addEventListener("submit", function(e){
    e.preventDefault();
    errorBox.innerText = "";
    
    const values = [];
    for(let i=0; i<mods.length; i++){
        const v = Number(form.querySelector(`[name=r${i}]`).value);
        if(!Number.isInteger(v)){ errorBox.innerText="整数を入力"; return; }
        if(v<0 || v>=mods[i]){ errorBox.innerText="範囲外"; return; }
        values.push(v);
    }

    // 1. まず工場を作り直す
    createBelts();
    mergeArea.innerHTML = "";
    resultBox.innerText = "";
    
    form.style.display = "none";
    rules.style.display = "none";
    factory.style.display = "block";

    // 計算
    let total = 0;
    const parts = [];
    for(let i=0; i<mods.length; i++){
        const Mi = M / mods[i];
        const yi = inv(Mi % mods[i], mods[i]);
        const part = values[i] * Mi * yi;
        parts.push(part);
        total += part;
    }

    /* ===== アニメーション開始 ===== */
    parts.forEach((val, i) => {
        const block = document.getElementById("block" + i);
        block.innerText = values[i];

        // 瞬間移動を防ぐための重要処理: 
        // 一瞬だけ時間を置いてからtransitionをオンにして移動を開始させる
        setTimeout(() => {
            block.style.transition = "left 2s ease-in-out";
            block.style.left = "130px";
        }, 100); // 0.1秒待つだけでテレポートが治ります

        setTimeout(() => {
            block.innerText = val;
        }, 2500);

        setTimeout(() => {
            block.style.transition = "left 3s ease-in-out";
            block.style.left = "calc(100% - 70px)";
        }, 3000);

        setTimeout(() => {
            const rect = block.getBoundingClientRect();
            const mRect = mergeArea.getBoundingClientRect();
            const dx = rect.left - mRect.left;
            const dy = rect.top - mRect.top;

            mergeArea.appendChild(block);
            block.style.transition = "none";
            block.style.left = dx + "px";
            block.style.top = dy + "px";
            block.offsetHeight; // リフロー強制

            block.style.transition = "top 1.5s cubic-bezier(0.47, 0, 0.745, 0.715)";
            block.style.top = "40px";
        }, 6500);
    });

    setTimeout(() => {
        const blocks = mergeArea.querySelectorAll(".block");
        blocks.forEach((b, i) => {
            b.style.transition = "left 1.5s ease";
            b.style.left = (i * 70) + "px";
        });
    }, 9000);

    setTimeout(() => {
        mergeArea.innerHTML = "";
        const sum = document.createElement("div");
        sum.className = "block";
        sum.style.left = "50%";
        sum.style.top = "40px";
        sum.style.transform = "translateX(-50%)";
        sum.style.width = "auto";
        sum.style.padding = "0 10px";
        sum.style.transition = "none";
        sum.innerText = total;
        mergeArea.appendChild(sum);

        let current = total;
        function subtract(){
            if(current >= M){
                current -= M;
                sum.innerText = current;
                sum.style.background = "#d9534f";
                setTimeout(() => sum.style.background = "#2a5298", 200);
                setTimeout(subtract, 600);
            } else {
                resultBox.innerText = "最終結果: " + current;
                setTimeout(() => {
                    form.style.display = "block";
                    rules.style.display = "block";
                    factory.style.display = "none";
                }, 2000);
            }
        }
        setTimeout(subtract, 1500);
    }, 11000);
});
</script>

</body>
</html>
